<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>To-Do App</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .container{
            background: white;
            padding: 25px;
            width: 450px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1{
            text-align: center;
            color: darkblue;
        }

        form{
            display: flex;
            gap: 10px;
        }

        input{
            flex: 1;
            padding: 10px;
        }

        button{
            padding: 10px;
            background-color: darkblue;
            color: white;
            border: none;
            cursor: pointer;
        }

        ul{
            list-style: none;
            padding: 0;
        }

        li{
            background: #eeeeee;
            margin-top: 10px;
            padding: 12px;
            border-radius: 5px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .completed{
            text-decoration: line-through;
            color: gray;
        }

        .actions a{
            margin-left: 10px;
            text-decoration: none;
            font-size: 14px;
        }

        .complete-btn{
            color: green;
        }

        .delete-btn{
            color: red;
        }

        .count{
            margin-top: 15px;
            text-align: center;
            color: #555;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>My To-Do List</h1>

        <form action="/add" method="POST">

            <input type="text" name="task" placeholder="Enter task">

            <button type="submit">Add</button>

        </form>

        <ul>

            {% for task in tasks %}

            <li>

                <span class="{% if task.done %}completed{% endif %}">
                    {{ task.name }}
                </span>

                <div class="actions">

                    <a class="complete-btn"
                       href="/complete/{{ loop.index0 }}">

                        {% if task.done %}
                            Undo
                        {% else %}
                            Complete
                        {% endif %}

                    </a>

                    <a class="delete-btn"
                       href="/delete/{{ loop.index0 }}">

                        Delete

                    </a>

                </div>

            </li>

            {% endfor %}

        </ul>

        <div class="count">

            Total Tasks: {{ tasks|length }}

        </div>

    </div>

</body>
</html>
